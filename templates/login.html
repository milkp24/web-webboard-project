<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:#0f172a; color:white;">
<div class="container mt-5" style="max-width: 450px;">
    <div class="card bg-dark text-white p-4 border-secondary shadow">
        <h3 class="mb-4 text-center">🔐 Login เข้าสู่ระบบ</h3>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} small py-2" role="alert">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <div class="mb-3">
                <label class="form-label small text-secondary">Username</label>
                <input name="username" class="form-control bg-dark text-white border-secondary" required placeholder="ชื่อผู้ใช้งานของคุณ">
            </div>
            <div class="mb-4">
                <label class="form-label small text-secondary">Password</label>
                <input type="password" name="password" class="form-control bg-dark text-white border-secondary" required placeholder="รหัสผ่านของคุณ">
            </div>
            <button class="btn btn-success w-100 mb-3">เข้าสู่ระบบ</button>
            <div class="text-center small">
                <a href="/register" class="text-secondary text-decoration-none">ยังไม่มีบัญชี? สมัครสมาชิกคลิกที่นี่</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
