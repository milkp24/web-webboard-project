<!DOCTYPE html>
<html>
<head>
    <title>Edit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#0f172a; color:white;">

<div class="container mt-5">

    <h3>✏️ Edit Post</h3>

    <form action="/update/{{ post[0] }}" method="POST">

        <input name="title" class="form-control mb-2" value="{{ post[1] }}">

        <textarea name="content" class="form-control mb-2">{{ post[2] }}</textarea>

        <button class="btn btn-success">Update</button>

    </form>

</div>

</body>
</html>
