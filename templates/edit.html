<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Post</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:#0f172a; color:white;">

<div class="container mt-5" style="max-width: 600px;">

    <h3 class="mb-4">✏️ Edit Post</h3>

    {% if post %}
        <form action="/update/{{ post['id'] }}" method="POST">
            <div class="mb-3">
                <label class="form-label text-secondary small">Title</label>
                <input name="title" value="{{ post['title'] }}" class="form-control bg-dark text-white border-secondary" required>
            </div>
            <div class="mb-3">
                <label class="form-label text-secondary small">Content</label>
                <textarea name="content" class="form-control bg-dark text-white border-secondary" rows="5" required>{{ post['content'] }}</textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success">Update</button>
                <a href="/" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    {% else %}
        <div class="alert alert-danger" role="alert">❌ Post not found.</div>
        <a href="/" class="btn btn-primary">Go Back Home</a>
    {% endif %}

</div>

</body>
</html>
